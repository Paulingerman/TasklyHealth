<main class="page active" id="page-routine">
      <div class="page-eyebrow">Configuração</div>
      <h1 class="page-title">Minha Rotina</h1>
      <p class="page-sub">Configure suas metas e habitos diários</p>

      <div class="routine-grid">
        <!-- Meta de água -->
        <div class="card">
          <div class="card-title"><i class='bx bx-droplet'></i>Meta de Hidratação</div>
          <div class="stepper-row">
            <span class="stepper-label">Água por dia</span>
            <div class="stepper">
              <button class="stepper-btn" onclick="step('waterGoal',-.5,.5,6)"><i class='bx bx-minus'></i></button>
              <span class="stepper-val" id="stWater">2.0L</span>
              <button class="stepper-btn" onclick="step('waterGoal',.5,.5,6)"><i class='bx bx-plus'></i></button>
            </div>
          </div>
        </div>

        <!-- Meta de sono -->
        <div class="card">
          <div class="card-title"><i class='bx bx-moon'></i>Meta de Sono</div>
          <div class="stepper-row">
            <span class="stepper-label">Horas por noite</span>
            <div class="stepper">
              <button class="stepper-btn" onclick="step('sleepGoal',-1,4,12)"><i class='bx bx-minus'></i></button>
              <span class="stepper-val" id="stSleep">8h</span>
              <button class="stepper-btn" onclick="step('sleepGoal',1,4,12)"><i class='bx bx-plus'></i></button>
            </div>
          </div>
        </div>

        <!-- Exercícios -->
        <div class="card" style="grid-column:1/-1">
          <div class="card-title"><i class='bx bx-dumbbell'></i>Exercícios</div>
          <label class="field-label">Modalidades de treino</label>
          <div class="chip-group" id="exTypeChips" style="margin-bottom:1.25rem">
            <button class="chip" data-ex="musculação"  onclick="toggleExType(this)">Musculação</button>
            <button class="chip" data-ex="cardio"      onclick="toggleExType(this)">Cardio</button>
            <button class="chip" data-ex="yoga"        onclick="toggleExType(this)">Yoga</button>
            <button class="chip" data-ex="funcional"   onclick="toggleExType(this)">Funcional</button>
            <button class="chip" data-ex="alongamento" onclick="toggleExType(this)">Alongamento</button>
            <button class="chip" data-ex="natação"     onclick="toggleExType(this)">Natação</button>
          </div>
          <label class="field-label">Dias de treino</label>
          <div class="day-row" id="dayBtns">
            <button class="day-btn" data-d="0" onclick="toggleDay(this)">Dom</button>
            <button class="day-btn" data-d="1" onclick="toggleDay(this)">Seg</button>
            <button class="day-btn" data-d="2" onclick="toggleDay(this)">Ter</button>
            <button class="day-btn" data-d="3" onclick="toggleDay(this)">Qua</button>
            <button class="day-btn" data-d="4" onclick="toggleDay(this)">Qui</button>
            <button class="day-btn" data-d="5" onclick="toggleDay(this)">Sex</button>
            <button class="day-btn" data-d="6" onclick="toggleDay(this)">Sab</button>
          </div>
        </div>

        <!-- Refeições -->
        <div class="card" style="grid-column:1/-1">
          <div class="card-title"><i class='bx bx-restaurant'></i>Refeições a registrar</div>
          <div class="toggle-list">
            <div class="toggle-item">
              <div class="toggle-item-left"><div class="toggle-item-icon"><i class='bx bx-coffee'></i></div><span class="toggle-item-label">Cafe da manha</span></div>
              <label class="toggle"><input type="checkbox" id="tg-breakfast" checked><span class="toggle-track"></span></label>
            </div>
            <div class="toggle-item">
              <div class="toggle-item-left"><div class="toggle-item-icon"><i class='bxs-bowl-hot bx'></i></div><span class="toggle-item-label">Almoco</span></div>
              <label class="toggle"><input type="checkbox" id="tg-lunch" checked><span class="toggle-track"></span></label>
            </div>
            <div class="toggle-item">
              <div class="toggle-item-left"><div class="toggle-item-icon"><i class='bx bx-food-tag'></i></div><span class="toggle-item-label">Lanche</span></div>
              <label class="toggle"><input type="checkbox" id="tg-snack"><span class="toggle-track"></span></label>
            </div>
            <div class="toggle-item">
              <div class="toggle-item-left"><div class="toggle-item-icon"><i class='bx bx-moon'></i></div><span class="toggle-item-label">Jantar</span></div>
              <label class="toggle"><input type="checkbox" id="tg-dinner" checked><span class="toggle-track"></span></label>
            </div>
          </div>
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;margin-top:1.25rem">
        <button class="btn btn-primary" id="saveRoutineBtn" onclick="saveRoutine()">
          <i class='bx bx-save'></i>Salvar rotina
        </button>
      </div>
    </main>
